<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Past Tense Adventure</title>
  <style>
    :root {
      --sky: #5c94fc;
      --grass: #5fa827;
      --dirt: #6b3a2a;
      --yellow: #ffd700;
      --coin: #e4a000;
      --brown: #7a3b00;
      --red: #e53935;
      --blue: #2563eb;
      --purple: #8b5cf6;
      --green: #22c55e;
      --orange: #f97316;
      --pink: #ec4899;
      --glass: rgba(255, 255, 255, 0.12);
      --glass2: rgba(255, 255, 255, 0.2);
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      background: linear-gradient(to bottom, var(--sky) 0%, var(--sky) 60%, var(--grass) 60%, var(--grass) 70%, var(--dirt) 70%, var(--dirt) 100%);
      overflow-x: hidden;
    }

    button, input { font-family: inherit; }

    .app {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      padding-bottom: 28px;
    }

    .font-display {
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      letter-spacing: 0.6px;
    }

    .bg-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .cloud {
      position: absolute;
      filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.15));
      opacity: .95;
      animation: floatCloud 8s ease-in-out infinite;
    }

    .brick-row {
      position: absolute;
      top: 60%;
      transform: translateY(-100%);
      left: 0;
      width: 100%;
      display: flex;
    }

    .brick {
      min-width: 32px;
      flex: 1;
      height: 32px;
      background: #c84b11;
      border: 1px solid rgba(80, 34, 10, 0.55);
      box-shadow: inset 0 5px 0 rgba(255,255,255,.12);
    }

    .question-block {
      position: absolute;
      width: 44px;
      height: 44px;
      top: 48%;
      display: grid;
      place-items: center;
      color: var(--brown);
      background: var(--coin);
      border: 4px solid #784000;
      border-radius: 5px;
      box-shadow: inset 0 4px 0 rgba(255,255,255,.25), 0 5px 0 rgba(0,0,0,.15);
      font: 28px Impact, sans-serif;
      animation: bump 2.2s ease-in-out infinite;
    }

    .star {
      position: absolute;
      animation: bounce 1.5s infinite;
    }

    .pipe {
      position: absolute;
      bottom: 0;
      width: 56px;
      border: 4px solid #166534;
      background: #3fa829;
      border-radius: 10px 10px 0 0;
      box-shadow: inset 8px 0 0 rgba(255,255,255,.2);
    }

    .floating-object {
      position: absolute;
      opacity: .7;
      animation: drift 11s ease-in-out infinite;
    }

    @keyframes floatCloud { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes bump { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes drift { 0%,100% { transform: translate(0,0) rotate(0deg); } 50% { transform: translate(15px,-15px) rotate(8deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { from { transform: scale(.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }

    .topbar {
      position: relative;
      z-index: 5;
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 16px 4px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .content {
      position: relative;
      z-index: 5;
      padding: 22px 16px;
    }

    .screen {
      animation: fadeIn .28s ease-out;
    }

    .welcome {
      max-width: 440px;
      margin: 0 auto;
      text-align: center;
      padding-top: 24px;
    }

    .badge {
      display: inline-block;
      background: #dc2626;
      border: 4px solid #facc15;
      border-radius: 18px;
      padding: 8px 22px;
      box-shadow: 0 10px 20px rgba(127, 29, 29, 0.35);
      color: #fef08a;
      font-size: 14px;
      text-transform: uppercase;
      animation: popIn .35s ease-out;
    }

    h1.title {
      font-size: clamp(48px, 12vw, 74px);
      margin: 16px 0 0;
      line-height: .95;
      text-shadow: 3px 3px 0 #c84b11, 6px 6px 0 #7a2d00;
    }

    h2.subtitle {
      color: var(--yellow);
      font-size: clamp(32px, 8vw, 46px);
      margin: 4px 0 14px;
      text-shadow: 2px 2px 0 #c84b11;
    }

    .pill {
      display: inline-block;
      background: rgba(0,0,0,.22);
      border-radius: 14px;
      padding: 9px 14px;
      font-weight: 800;
      font-size: 14px;
    }

    .big-emoji {
      font-size: 68px;
      margin: 24px 0;
      animation: bounce 1.5s infinite;
    }

    .primary-btn, .secondary-btn, .ghost-btn, .danger-btn {
      border: none;
      cursor: pointer;
      transition: transform .15s ease, filter .15s ease, opacity .15s ease;
      font-weight: 900;
    }

    .primary-btn:hover, .secondary-btn:hover, .ghost-btn:hover, .danger-btn:hover { transform: scale(1.02); filter: brightness(1.05); }
    .primary-btn:active, .secondary-btn:active, .ghost-btn:active, .danger-btn:active { transform: scale(.98); }
    button:disabled { cursor: not-allowed; opacity: .45; transform: none !important; }

    .play-btn {
      width: 100%;
      padding: 22px;
      border-radius: 18px;
      background: var(--coin);
      color: #3d2700;
      border-bottom: 6px solid #7a5000;
      font-size: 30px;
      text-shadow: 1px 1px 0 #ffe76a;
      box-shadow: var(--shadow);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(0,0,0,.62);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      animation: fadeIn .18s ease-out;
    }

    .modal {
      width: min(100%, 410px);
      background: linear-gradient(to bottom, #2563eb, #1e3a8a);
      border: 4px solid #facc15;
      border-radius: 28px;
      box-shadow: 0 26px 60px rgba(0,0,0,.45);
      padding: 28px;
      text-align: center;
      animation: popIn .22s ease-out;
    }

    .modal input {
      width: 100%;
      background: rgba(255,255,255,.12);
      border: 2px solid rgba(255,255,255,.28);
      border-radius: 18px;
      padding: 15px 18px;
      color: white;
      text-align: center;
      font-size: 22px;
      outline: none;
      margin: 16px 0;
      font-weight: 900;
    }

    .modal input::placeholder { color: rgba(255,255,255,.42); }
    .modal input:focus { border-color: rgba(250,204,21,.85); }

    .avatar-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 12px 0 20px;
    }

    .avatar {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.12);
      font-size: 30px;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease, border .15s ease;
    }
    .avatar:hover { transform: translateY(-2px); }
    .avatar.selected { background: rgba(250,204,21,.28); border-color: #facc15; box-shadow: 0 0 0 4px rgba(250,204,21,.16); }
    .avatar.sm { width: 44px; height: 44px; font-size: 26px; border-radius: 13px; cursor: default; }
    .avatar.lg { width: 74px; height: 74px; font-size: 46px; border-radius: 22px; cursor: default; }

    .xp-wrap { flex: 1; min-width: 0; }
    .xp-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; font-weight: 900; text-shadow: 0 1px 0 rgba(0,0,0,.35); }
    .xp-bar { height: 14px; background: rgba(0,0,0,.25); border-radius: 999px; overflow: hidden; border: 2px solid rgba(255,255,255,.22); }
    .xp-fill { height: 100%; background: linear-gradient(90deg, #facc15, #f97316); border-radius: 999px; transition: width .35s ease; }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: rgba(255,255,255,.14);
      color: white;
      border: 1px solid rgba(255,255,255,.18);
      cursor: pointer;
      font-weight: 900;
    }

    .container {
      width: min(100%, 760px);
      margin: 0 auto;
    }
    .container.narrow { width: min(100%, 540px); }

    .menu-heading { text-align: center; margin-bottom: 26px; }
    .menu-heading h2 { margin: 0; font-size: 28px; }
    .menu-heading p { margin: 7px 0 0; color: rgba(255,255,255,.7); }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 26px;
    }

    .stat-card, .glass-card {
      background: var(--glass);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 22px;
      padding: 18px;
      backdrop-filter: blur(7px);
      box-shadow: 0 10px 24px rgba(0,0,0,.12);
    }

    .stat-card { text-align: center; }
    .stat-num { font: 30px Impact, sans-serif; color: #facc15; }
    .stat-label { color: rgba(255,255,255,.62); font-size: 12px; margin-top: 3px; }

    .action-list { display: grid; gap: 14px; }
    .action-card {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 19px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 22px;
      color: white;
      box-shadow: var(--shadow);
      text-align: left;
    }
    .action-icon { font-size: 34px; width: 44px; text-align: center; }
    .action-title { font: 22px Impact, sans-serif; }
    .action-sub { color: rgba(255,255,255,.76); font-size: 13px; margin-top: 2px; }
    .learn-bg { background: linear-gradient(90deg, #3b82f6, #06b6d4); }
    .play-bg { background: linear-gradient(90deg, #8b5cf6, #ec4899); }
    .stats-bg { background: linear-gradient(90deg, #f59e0b, #f97316); }

    .back-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }
    .back-row h2 { margin: 0; text-align: right; font-size: 24px; }

    .ghost-btn {
      background: rgba(255,255,255,.12);
      color: rgba(255,255,255,.85);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 14px;
      padding: 11px 14px;
    }

    .secondary-btn {
      border-radius: 16px;
      padding: 14px 18px;
      background: white;
      color: #1e3a8a;
      box-shadow: 0 8px 16px rgba(0,0,0,.15);
    }

    .lesson-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 16px 0;
    }
    .lesson-tab {
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.12);
      color: white;
      padding: 10px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 900;
    }
    .lesson-tab.active { background: #facc15; color: #3d2700; }
    .lesson-card h3 { margin-top: 0; font-size: 28px; }
    .lesson-card p, .lesson-card li { line-height: 1.55; color: rgba(255,255,255,.9); }
    .lesson-card code {
      background: rgba(0,0,0,.22);
      padding: 2px 6px;
      border-radius: 7px;
      color: #fef08a;
      font-weight: bold;
    }
    .example-box {
      background: rgba(0,0,0,.18);
      border-left: 5px solid #facc15;
      border-radius: 14px;
      padding: 14px;
      margin: 14px 0;
    }

    .world-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
    }
    .world-card {
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 24px;
      padding: 18px;
      color: white;
      min-height: 180px;
      text-align: left;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .world-card::after {
      content: '';
      position: absolute;
      right: -38px;
      bottom: -38px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,.16);
    }
    .world-emoji { font-size: 42px; margin-bottom: 8px; }
    .world-title { font: 24px Impact, sans-serif; margin: 0 0 5px; }
    .world-desc { color: rgba(255,255,255,.78); font-size: 13px; line-height: 1.35; min-height: 36px; }
    .world-progress { margin-top: 15px; }
    .small-bar { height: 9px; background: rgba(0,0,0,.25); border-radius: 999px; overflow: hidden; }
    .small-fill { height: 100%; background: white; border-radius: 999px; transition: width .35s ease; }
    .small-text { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 12px; font-weight: 900; }

    .question-card {
      width: min(100%, 620px);
      margin: 0 auto;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 28px;
      padding: 22px;
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
    }
    .q-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 16px; }
    .q-badge { background: rgba(0,0,0,.22); border-radius: 999px; padding: 8px 12px; font-size: 13px; font-weight: 900; }
    .q-world { font-size: 38px; }
    .question-text {
      font-size: 25px;
      line-height: 1.28;
      margin: 14px 0 18px;
      font-weight: 900;
      color: white;
    }
    .answers { display: grid; gap: 11px; }
    .answer-btn {
      width: 100%;
      padding: 15px 16px;
      border-radius: 18px;
      border: 2px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.14);
      color: white;
      text-align: left;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease, border .15s ease;
    }
    .answer-btn:hover { transform: translateY(-2px); background: rgba(255,255,255,.22); }
    .answer-btn.correct { background: rgba(34,197,94,.9); border-color: #bbf7d0; }
    .answer-btn.wrong { background: rgba(239,68,68,.9); border-color: #fecaca; animation: shake .35s ease; }
    .answer-btn.dim { opacity: .55; }

    .feedback {
      margin-top: 16px;
      padding: 15px;
      border-radius: 18px;
      background: rgba(0,0,0,.22);
      display: none;
      line-height: 1.45;
    }
    .feedback.show { display: block; }
    .feedback strong { color: #fef08a; }
    .next-btn {
      width: 100%;
      margin-top: 14px;
      padding: 15px;
      border-radius: 18px;
      background: #facc15;
      color: #3d2700;
      border: none;
      font-weight: 900;
      cursor: pointer;
      display: none;
    }
    .next-btn.show { display: block; }

    .complete-card {
      width: min(100%, 560px);
      margin: 0 auto;
      text-align: center;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 30px;
      padding: 28px;
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
    }
    .complete-emoji { font-size: 78px; animation: bounce 1.4s infinite; }
    .complete-card h2 { font-size: 36px; margin: 10px 0; }
    .score-ring {
      width: 134px;
      height: 134px;
      margin: 20px auto;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(#facc15 var(--score-deg), rgba(255,255,255,.16) 0);
      box-shadow: inset 0 0 0 12px rgba(0,0,0,.2);
      font: 34px Impact, sans-serif;
      color: white;
      text-shadow: 0 2px 0 rgba(0,0,0,.25);
    }
    .complete-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 18px; }

    .profile-row { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
    .profile-row h3 { margin: 0 0 3px; font-size: 28px; }
    .profile-row p { margin: 3px 0; color: rgba(255,255,255,.74); }
    .two-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .world-progress-list { display: grid; gap: 12px; margin-top: 18px; }
    .danger-btn {
      background: transparent;
      color: rgba(248,113,113,.75);
      text-decoration: underline;
      padding: 12px;
      margin-top: 20px;
    }

    .bg1 { background: linear-gradient(135deg, #2563eb, #06b6d4); }
    .bg2 { background: linear-gradient(135deg, #16a34a, #84cc16); }
    .bg3 { background: linear-gradient(135deg, #ef4444, #f97316); }
    .bg4 { background: linear-gradient(135deg, #7c3aed, #ec4899); }
    .bg5 { background: linear-gradient(135deg, #f59e0b, #eab308); }
    .bg6 { background: linear-gradient(135deg, #0f766e, #38bdf8); }

    .hidden { display: none !important; }

    @media (max-width: 560px) {
      .stats-grid, .two-grid { grid-template-columns: 1fr; }
      .complete-actions { grid-template-columns: 1fr; }
      .topbar { align-items: flex-start; }
      .question-text { font-size: 21px; }
      .action-card { padding: 16px; }
    }

    @media print {
      .bg-layer, .topbar { display: none; }
      body { background: white; color: black; }
      .glass-card, .question-card, .complete-card { color: black; background: white; border: 1px solid #aaa; box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="bg-layer" aria-hidden="true">
      <div class="cloud" style="left:5%;top:8%;font-size:58px">☁️</div>
      <div class="cloud" style="left:30%;top:4%;font-size:44px;animation-delay:.8s">☁️</div>
      <div class="cloud" style="left:55%;top:10%;font-size:66px;animation-delay:1.2s">☁️</div>
      <div class="cloud" style="left:78%;top:5%;font-size:50px;animation-delay:.3s">☁️</div>
      <div class="brick-row" id="brickRow"></div>
      <div class="question-block" style="left:15%">?</div>
      <div class="question-block" style="left:45%;animation-delay:.4s">?</div>
      <div class="question-block" style="left:70%;animation-delay:.8s">?</div>
      <div class="star" style="left:20%;top:30%;font-size:24px">⭐</div>
      <div class="star" style="left:50%;top:30%;font-size:24px;animation-delay:.4s">⭐</div>
      <div class="star" style="left:80%;top:30%;font-size:24px;animation-delay:.8s">⭐</div>
      <div class="pipe" style="left:10%;height:66px"></div>
      <div class="pipe" style="left:85%;height:96px"></div>
      <div class="floating-object" style="left:8%;top:72%;font-size:24px">🍄</div>
      <div class="floating-object" style="left:88%;top:42%;font-size:26px;animation-delay:1s">🪙</div>
      <div class="floating-object" style="left:35%;top:75%;font-size:24px;animation-delay:2s">🌟</div>
    </div>

    <div id="topbar" class="topbar hidden"></div>
    <main id="content" class="content"></main>
  </div>

  <script>
    const STORAGE_KEY = 'simple_past_game_html_v1';
    const avatars = ['🧑‍🎓', '👩‍🎓', '🧙', '🦸', '🐱', '🐶'];
    let lessonTab = 0;
    let answeringLocked = false;

    const worlds = [
      {
        id: 'regular',
        name: 'Regular Verb Hills',
        emoji: '🌄',
        bg: 'bg1',
        desc: 'Practice verbs that use -ed in the past.',
        questions: [
          q('Yesterday, I ___ soccer with my friends.', ['played', 'play', 'plays', 'playing'], 0, 'Use the past form: play → played.'),
          q('She ___ TV last night.', ['watch', 'watched', 'watches', 'watching'], 1, 'For yesterday/last night, use watched.'),
          q('They ___ their room on Saturday.', ['cleaned', 'clean', 'cleans', 'cleaning'], 0, 'Clean is a regular verb: clean → cleaned.'),
          q('We ___ to music after school.', ['listen', 'listened', 'listens', 'listening'], 1, 'Regular verbs usually add -ed: listened.'),
          q('He ___ his grandmother yesterday.', ['visited', 'visit', 'visits', 'visiting'], 0, 'Visit → visited.'),
          q('My brother ___ a big pizza.', ['cooked', 'cook', 'cooks', 'cooking'], 0, 'Cook → cooked.'),
          q('I ___ the door because it was cold.', ['closed', 'close', 'closes', 'closing'], 0, 'Close already ends with e, so add d: closed.'),
          q('The students ___ hard for the test.', ['studied', 'study', 'studys', 'studying'], 0, 'Study changes y to i + ed: studied.'),
          q('My mom ___ at the funny movie.', ['laughed', 'laugh', 'laughs', 'laughing'], 0, 'Laugh → laughed.'),
          q('We ___ the game at 6 PM.', ['started', 'start', 'starts', 'starting'], 0, 'Start → started.' )
        ]
      },
      {
        id: 'irregular',
        name: 'Irregular Jungle',
        emoji: '🌴',
        bg: 'bg2',
        desc: 'Memorize special past tense verbs.',
        questions: [
          q('Yesterday, I ___ to the store.', ['go', 'went', 'goed', 'going'], 1, 'Go is irregular: go → went.'),
          q('She ___ breakfast at 7 AM.', ['ate', 'eat', 'eated', 'eating'], 0, 'Eat is irregular: eat → ate.'),
          q('They ___ a new English word.', ['learned', 'learnt', 'learn', 'A and B are correct'], 3, 'Both learned and learnt can be past forms. Learned is more common in American English.'),
          q('He ___ a blue jacket yesterday.', ['wear', 'wore', 'weared', 'wearing'], 1, 'Wear → wore.'),
          q('We ___ a song in class.', ['sang', 'sing', 'singed', 'singing'], 0, 'Sing → sang.'),

    const defaultState = {
      screen: 'welcome',
      showNameModal: false,
      playerName: '',
      nameInput: '',
      avatarIdx: 0,
      xp: 0,
      level: 1,
      streak: 0,
      worldProgress: {},
      currentWorldId: null,
      currentQIdx: 0,
      sessionCorrect: 0,
      answeredCurrent: false,
      sound: true
    };

    let state = loadState();
    const totalQuestions = worlds.reduce((sum, w) => sum + w.questions.length, 0);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (saved && saved.playerName) {
          return { ...defaultState, ...saved, screen: 'menu', showNameModal: false, currentWorldId: null, currentQIdx: 0, sessionCorrect: 0, answeredCurrent: false };
        }
      } catch (e) {}
      return { ...defaultState };
    }

    function saveState() {
      const saved = {
        playerName: state.playerName,
        avatarIdx: state.avatarIdx,
        xp: state.xp,
        level: state.level,
        streak: state.streak,
        worldProgress: state.worldProgress,
        sound: state.sound
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
    }

    function esc(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function $(id) { return document.getElementById(id); }

    function totalAnswered() {
      return Object.values(state.worldProgress).reduce((s, p) => s + (p.answered || 0), 0);
    }

    function totalCorrect() {
      return Object.values(state.worldProgress).reduce((s, p) => s + (p.correct || 0), 0);
    }

    function xpForCurrentLevel() {
      const levelStart = (state.level - 1) * 100;
      return Math.max(0, state.xp - levelStart);
    }

    function addXP(amount) {
      state.xp += amount;
      while (state.xp >= state.level * 100) {
        state.level += 1;
      }
    }

    function renderBrickRow() {
      $('brickRow').innerHTML = Array.from({ length: 34 }, () => '<div class="brick"></div>').join('');
    }

    function avatarHTML(idx, options = {}) {
      const cls = options.className || '';
      return `<div class="avatar ${cls}" aria-label="avatar">${avatars[idx] || avatars[0]}</div>`;
    }

    function topbarHTML() {
      const xpPct = Math.min(100, Math.round((xpForCurrentLevel() / 100) * 100));
      if (state.screen === 'welcome') {
        $('topbar').classList.add('hidden');
        $('topbar').innerHTML = '';
        return;
      }
      $('topbar').classList.remove('hidden');
      $('topbar').innerHTML = `
        ${avatarHTML(state.avatarIdx, { className: 'sm' })}
        <div class="xp-wrap">
          <div class="xp-top">
            <span>Level ${state.level} • ${state.xp} XP</span>
            <span>🔥 ${state.streak} streak</span>
          </div>
          <div class="xp-bar"><div class="xp-fill" style="width:${xpPct}%"></div></div>
        </div>
        <button class="icon-btn" onclick="toggleSound()" title="Sound">${state.sound ? '🔊' : '🔇'}</button>
        ${state.screen !== 'menu' ? '<button class="icon-btn" onclick="goTo(\'menu\')" title="Home">🏠</button>' : ''}
      `;
    }

    function render() {
      topbarHTML();
      const content = $('content');
      if (state.screen === 'welcome') content.innerHTML = welcomeHTML();
      if (state.screen === 'menu') content.innerHTML = menuHTML();
      if (state.screen === 'learn') content.innerHTML = learnHTML();
      if (state.screen === 'worldMap') content.innerHTML = worldMapHTML();
      if (state.screen === 'playing') content.innerHTML = playingHTML();
      if (state.screen === 'worldComplete') content.innerHTML = completeHTML();
      if (state.screen === 'stats') content.innerHTML = statsHTML();
      if (state.showNameModal) content.insertAdjacentHTML('beforeend', nameModalHTML());
      const nameInput = $('nameInput');
      if (nameInput) {
        nameInput.focus();
        nameInput.value = state.nameInput;
      }
      saveState();
    }

      return `

          <button class="primary-btn play-btn font-display" onclick="openNameModal()">▶ PLAY</button>
        </section>`;

    function menuHTML() {
      return `
        <section class="screen container narrow">
          <div class="menu-heading">

            <button class="action-card stats-bg" onclick="goTo('stats')">

    function learnHTML() {
      const lesson = lessons[lessonTab] || lessons[0];
      const tabs = lessons.map((l, i) => `<button class="lesson-tab ${i === lessonTab ? 'active' : ''}" onclick="setLesson(${i})">${l.emoji} ${i + 1}</button>`).join('');
      return `
        <section class="screen container">

    function worldMapHTML() {
      const cards = worlds.map(w => {
        const p = state.worldProgress[w.id] || { answered: 0, correct: 0 };
        const pct = Math.round(((p.correct || 0) / w.questions.length) * 100);
        const completed = p.correct >= w.questions.length;
        return `
          <button class="world-card ${w.bg}" onclick="selectWorld('${w.id}')">
            <div class="world-emoji">${w.emoji}</div>
            <h3 class="world-title">${w.name} ${completed ? '✅' : ''}</h3>
            <div class="world-desc">${w.desc}</div>
            <div class="world-progress">
              <div class="small-text"><span>Progress</span><span>${p.correct || 0}/${w.questions.length}</span></div>
              <div class="small-bar"><div class="small-fill" style="width:${pct}%"></div></div>
            </div>
          </button>`;
      }).join('');

        <section class="screen container">
          <div class="back-row">
            <button class="ghost-btn" onclick="goTo('menu')">← Back</button>

          <div class="world-grid">${cards}</div>

    function playingHTML() {
      const world = worlds.find(w => w.id === state.currentWorldId);
      if (!world) return `<section class="screen container narrow"><div class="glass-card">World not found. <button onclick="goTo('worldMap')">Back</button></div></section>`;
      const question = world.questions[state.currentQIdx];
      const options = question.options.map((opt, i) => `<button class="answer-btn" id="answer${i}" onclick="answerQuestion(${i})">${String.fromCharCode(65+i)}. ${esc(opt)}</button>`).join('');
      const pct = Math.round((state.currentQIdx / world.questions.length) * 100);
      return `
        <section class="screen question-card">
          <div class="q-header">
            <span class="q-world">${world.emoji}</span>
            <span class="q-badge">Question ${state.currentQIdx + 1} / ${world.questions.length}</span>
          </div>
          <div class="small-bar" style="margin-bottom:16px"><div class="small-fill" style="width:${pct}%;background:#facc15"></div></div>

          <div class="answers">${options}</div>
          <div id="feedback" class="feedback"></div>
          <button id="nextBtn" class="next-btn" onclick="nextQuestion()">Next →</button>
        </section>`;

    function completeHTML() {
      const world = worlds.find(w => w.id === state.currentWorldId);
      const total = world ? world.questions.length : 0;
      const score = total ? Math.round((state.sessionCorrect / total) * 100) : 0;
      let message = 'Nice practice! Try again to improve your score.';
      if (score >= 90) message = 'Amazing! You mastered this world!';
      else if (score >= 70) message = 'Great job! You are getting stronger!';
      else if (score >= 50) message = 'Good effort! Review the lesson and try again.';
      return `
        <section class="screen complete-card">
          <div class="complete-emoji">${score >= 70 ? '🏆' : '🌟'}</div>
          <h2 class="font-display">World Complete!</h2>
          <p>${esc(world?.name || '')}</p>
          <div class="score-ring" style="--score-deg:${score * 3.6}deg">${score}%</div>
          <p><strong>${state.sessionCorrect}</strong> correct out of <strong>${total}</strong></p>
          <p style="color:rgba(255,255,255,.78)">${message}</p>

            <button class="secondary-btn" onclick="retryWorld()">Retry 🔁</button>
            <button class="secondary-btn" onclick="goTo('worldMap')">Map 🗺️</button>
          </div>
        </section>`;
    }

    function statsHTML() {
      const answered = totalAnswered();
      const correct = totalCorrect();
      const accuracy = answered ? Math.round((correct / answered) * 100) : 0;
      const rows = worlds.map(w => {
        const p = state.worldProgress[w.id] || { answered: 0, correct: 0 };
        const pct = Math.round(((p.correct || 0) / w.questions.length) * 100);
        return `
          <div class="glass-card" style="padding:14px">
            <div class="small-text"><span>${w.emoji} ${w.name}</span><span>${p.correct || 0}/${w.questions.length}</span></div>
            <div class="small-bar"><div class="small-fill" style="width:${pct}%;background:#facc15"></div></div>
          </div>`;
      }).join('');
      return `
        <section class="screen container narrow">
          <div class="back-row">
            <button class="ghost-btn" onclick="goTo('menu')">← Back</button>
            <h2 class="font-display">🏆 Your Stats</h2>

              <div class="stat-card"><div class="stat-num" style="color:#c084fc">${accuracy}%</div><div class="stat-label">Accuracy</div></div>
              <div class="stat-card"><div class="stat-num" style="color:#fb923c">${state.streak}</div><div class="stat-label">Streak 🔥</div></div>
            </div>
          </div>
          <h3 class="font-display" style="margin:22px 0 12px">World Progress</h3>
          <div class="world-progress-list">${rows}</div>
          <div style="text-align:center"><button class="danger-btn" onclick="resetProgress()">Reset All Progress</button></div>
        </section>`;

    }

    function selectAvatar(idx) {
      state.avatarIdx = idx;
      render();
    }

    function startGame() {
      const input = $('nameInput');
      const value = (input ? input.value : state.nameInput).trim();
      if (!value) return;
      state.playerName = value.slice(0, 20);
      state.showNameModal = false;
      state.screen = 'menu';
      playSound('start');
      render();
    }

    function goTo(screen) {
      state.screen = screen;
      state.answeredCurrent = false;
      answeringLocked = false;
      render();
    }

    function setLesson(i) { lessonTab = i; render(); }
    function nextLesson() { if (lessonTab < lessons.length - 1) lessonTab += 1; render(); }
    function prevLesson() { if (lessonTab > 0) lessonTab -= 1; render(); }

    function selectWorld(id) {
      state.currentWorldId = id;
      state.currentQIdx = 0;
      state.sessionCorrect = 0;
      state.answeredCurrent = false;
      answeringLocked = false;
      state.screen = 'playing';
      render();
    }

    function answerQuestion(selected) {
      if (answeringLocked) return;
      answeringLocked = true;
      const world = worlds.find(w => w.id === state.currentWorldId);
      const question = world.questions[state.currentQIdx];
      const correct = selected === question.answer;
      const feedback = $('feedback');
      const nextBtn = $('nextBtn');

      question.options.forEach((_, i) => {
        const btn = $('answer' + i);
        if (!btn) return;
        btn.disabled = true;
        if (i === question.answer) btn.classList.add('correct');
        else if (i === selected) btn.classList.add('wrong');
        else btn.classList.add('dim');
      });

      if (correct) {
        state.sessionCorrect += 1;
        state.streak += 1;
        addXP(10);
        playSound('correct');
      } else {
        state.streak = 0;
        playSound('wrong');
      }

      feedback.innerHTML = correct
        ? `✅ <strong>Correct!</strong><br>${esc(question.explanation)}`
        : `❌ <strong>Not quite.</strong><br>${esc(question.explanation)}<br><br><strong>Correct answer:</strong> ${esc(question.options[question.answer])}`;
      feedback.classList.add('show');
      nextBtn.classList.add('show');
      topbarHTML();
      saveState();
    }

    function nextQuestion() {
      const world = worlds.find(w => w.id === state.currentWorldId);
      const nextIdx = state.currentQIdx + 1;
      if (nextIdx >= world.questions.length) {
        const previous = state.worldProgress[state.currentWorldId] || { answered: 0, correct: 0 };
        state.worldProgress[state.currentWorldId] = {
          answered: world.questions.length,
          correct: Math.max(previous.correct || 0, state.sessionCorrect)
        };
        state.screen = 'worldComplete';
        playSound('complete');
      } else {
        state.currentQIdx = nextIdx;
        state.screen = 'playing';
      }
      state.answeredCurrent = false;
      answeringLocked = false;
      render();
    }

    function retryWorld() {
      state.currentQIdx = 0;
      state.sessionCorrect = 0;
      state.answeredCurrent = false;
      answeringLocked = false;
      state.screen = 'playing';
      render();
    }

    function resetProgress() {
      const ok = confirm('Reset all progress and go back to the welcome screen?');
      if (!ok) return;
      localStorage.removeItem(STORAGE_KEY);
      state = { ...defaultState };
      lessonTab = 0;
      answeringLocked = false;
      render();
    }

    function toggleSound() {
      state.sound = !state.sound;
      playSound('toggle');
      render();
    }

    function playSound(type) {
      if (!state.sound) return;
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const now = ctx.currentTime;
        const tones = {
          correct: [660, 880], wrong: [180, 120], start: [440, 660], complete: [523, 659], toggle: [300, 400]
        };
        const pair = tones[type] || tones.toggle;
        osc.type = 'square';
        osc.frequency.setValueAtTime(pair[0], now);
        osc.frequency.exponentialRampToValueAtTime(pair[1], now + 0.12);
        gain.gain.setValueAtTime(0.04, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.16);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.17);
      } catch (e) {}
    }

    renderBrickRow();
    render();
  </script>
</body>
</html>
